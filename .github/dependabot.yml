# Dependabot keeps dependencies current. Frontend npm and backend pip are updated
# separately; github-actions are grouped weekly. Updates are grouped to reduce PR
# noise (same pattern as homebridge-myleviton / homebridge-myresideo).
# See: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
    groups:
      # Batch only low-risk patch/minor updates so they stay easy to review.
      # Major bumps (e.g. vite, eslint, typescript, vitest) arrive as their own
      # PRs and get evaluated and migrated deliberately.
      frontend:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore"
    groups:
      backend:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
